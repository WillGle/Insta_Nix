#!/usr/bin/env bash
set -euo pipefail
export PATH="$PATH:/run/current-system/sw/bin"

# Small logger (optional)
log() { printf '[autostart] %s\n' "$*" >&2; }

# Helper: launch only if not already running
launch_if_missing() {
  local name="$1"; shift
  if ! command -v "$name" >/dev/null 2>&1; then
    log "Missing: $name"
    return 0
  fi
  if ! pgrep -x "$name" >/dev/null; then
    log "Launching: $name"
    "$@" &
  else
    log "Already running: $name"
  fi
}

# Launch an app only after a dependency process is observed running.
launch_when_running() {
  local dep="$1"; shift
  local name="$1"; shift
  local tries="$1"; shift
  (
    for _ in $(seq 1 "$tries"); do
      if pgrep -x "$dep" >/dev/null; then
        launch_if_missing "$name" "$@"
        exit 0
      fi
      sleep 1
    done
    log "Skipping $name: waiting for $dep timed out"
  ) &
}

# --- Background services ---
( sleep 0.5; launch_if_missing hyprpaper hyprpaper ) &

launch_if_missing dunst dunst
if [ -f "$HOME/.config/sxhkd/sxhkdrc" ]; then
  launch_if_missing sxhkd sxhkd
else
  log "Skipping sxhkd: missing ~/.config/sxhkd/sxhkdrc"
fi
launch_if_missing fcitx5 fcitx5 -dr

# udiskie & bluetooth trays
launch_if_missing udiskie udiskie --tray
launch_if_missing blueman-applet blueman-applet

# Clipboard history watcher
if command -v wl-paste >/dev/null 2>&1 && command -v cliphist >/dev/null 2>&1; then
  pgrep -fa 'wl-paste.*cliphist' >/dev/null || {
    log "Launching: cliphist watcher"
    wl-paste --watch cliphist store -max-items 100 &
  }
else
  log "Missing: wl-paste or cliphist"
fi

if command -v systemctl >/dev/null 2>&1; then
  systemctl --user import-environment \
    DISPLAY WAYLAND_DISPLAY XDG_CURRENT_DESKTOP XDG_SESSION_TYPE XDG_SESSION_ID \
    HYPRLAND_INSTANCE_SIGNATURE XDG_RUNTIME_DIR PATH >/dev/null 2>&1 || true
  systemctl --user restart rofi-screen-time-tracker.service >/dev/null 2>&1 || true
fi
